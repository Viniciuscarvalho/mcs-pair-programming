<svg width="1280" height="400" viewBox="0 0 1280 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161b22;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7ee787;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#58a6ff;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="400" fill="url(#bg)" rx="12"/>

  <!-- Subtle grid lines -->
  <g stroke="#21262d" stroke-width="1" opacity="0.6">
    <line x1="0" y1="80" x2="1280" y2="80"/>
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="240" x2="1280" y2="240"/>
    <line x1="0" y1="320" x2="1280" y2="320"/>
    <line x1="160" y1="0" x2="160" y2="400"/>
    <line x1="320" y1="0" x2="320" y2="400"/>
    <line x1="480" y1="0" x2="480" y2="400"/>
    <line x1="640" y1="0" x2="640" y2="400"/>
    <line x1="800" y1="0" x2="800" y2="400"/>
    <line x1="960" y1="0" x2="960" y2="400"/>
    <line x1="1120" y1="0" x2="1120" y2="400"/>
  </g>

  <!-- Accent bar top -->
  <rect x="0" y="0" width="1280" height="4" fill="url(#accent)" rx="2"/>

  <!-- Terminal window (left side) -->
  <rect x="60" y="80" width="500" height="240" fill="#0d1117" rx="8" stroke="#30363d" stroke-width="1"/>
  <!-- Terminal title bar -->
  <rect x="60" y="80" width="500" height="32" fill="#161b22" rx="8"/>
  <rect x="60" y="96" width="500" height="16" fill="#161b22"/>
  <!-- Traffic lights -->
  <circle cx="88" cy="96" r="6" fill="#ff5f57"/>
  <circle cx="108" cy="96" r="6" fill="#febc2e"/>
  <circle cx="128" cy="96" r="6" fill="#28c840"/>
  <!-- Terminal title -->
  <text x="300" y="101" font-family="monospace" font-size="12" fill="#8b949e" text-anchor="middle">claude code — pair programming</text>

  <!-- Terminal content -->
  <text x="80" y="138" font-family="monospace" font-size="11" fill="#8b949e">$ mcs sync</text>
  <text x="80" y="158" font-family="monospace" font-size="11" fill="#7ee787">🤝 Pair Programming — Session Start</text>
  <text x="80" y="178" font-family="monospace" font-size="11" fill="#30363d">━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━</text>
  <text x="80" y="198" font-family="monospace" font-size="11" fill="#8b949e">Stack:    <tspan fill="#58a6ff">Swift/iOS</tspan></text>
  <text x="80" y="218" font-family="monospace" font-size="11" fill="#8b949e">CLAUDE.md: <tspan fill="#7ee787">✅ Found</tspan></text>
  <text x="80" y="238" font-family="monospace" font-size="11" fill="#8b949e">Git:      <tspan fill="#f0883e">feature/xyz | 3 uncommitted</tspan></text>
  <text x="80" y="258" font-family="monospace" font-size="11" fill="#8b949e">Style:    <tspan fill="#d2a8ff">driver-navigator</tspan></text>
  <text x="80" y="278" font-family="monospace" font-size="11" fill="#30363d">━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━</text>
  <text x="80" y="298" font-family="monospace" font-size="11" fill="#7ee787">Ready to pair. <tspan fill="#8b949e">Use /pair, /review, /handoff</tspan></text>

  <!-- Right side: Title + description -->
  <text x="700" y="155" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="52" font-weight="700" fill="#f0f6fc" filter="url(#glow)">Pair Programming</text>

  <!-- Gradient underline -->
  <rect x="700" y="168" width="320" height="3" fill="url(#accent)" rx="2"/>

  <text x="700" y="210" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" fill="#8b949e">A tech pack that turns Claude Code into a</text>
  <text x="700" y="234" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" fill="#8b949e">stack-agnostic pair programming partner.</text>
  <text x="700" y="258" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" fill="#8b949e">Plug-and-play. Zero code modifications.</text>

  <!-- Badges row -->
  <rect x="700" y="290" width="90" height="24" fill="#1f2937" rx="4" stroke="#30363d" stroke-width="1"/>
  <text x="745" y="306" font-family="monospace" font-size="11" fill="#7ee787" text-anchor="middle">mcs ≥ 2026</text>

  <rect x="800" y="290" width="70" height="24" fill="#1f2937" rx="4" stroke="#30363d" stroke-width="1"/>
  <text x="835" y="306" font-family="monospace" font-size="11" fill="#ffd60a" text-anchor="middle">MIT</text>

  <rect x="880" y="290" width="110" height="24" fill="#1f2937" rx="4" stroke="#30363d" stroke-width="1"/>
  <text x="935" y="306" font-family="monospace" font-size="11" fill="#ea6045" text-anchor="middle">♥ Sponsor</text>

  <!-- Bottom label -->
  <text x="640" y="380" font-family="monospace" font-size="11" fill="#484f58" text-anchor="middle">github.com/Viniciuscarvalho/mcs-pair-programming</text>
</svg>
